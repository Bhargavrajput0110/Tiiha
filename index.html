        // Spring-based floating image — pure rAF, no Framer Motion needed
        const useSpringFollow = () => {
            const posRef = useRef({ x: 0, y: 0 });
            const targetRef = useRef({ x: 0, y: 0 });
            const velRef = useRef({ x: 0, y: 0 });
            const elRef = useRef(null);
            useEffect(() => {
                const onMove = (e) => { targetRef.current = { x: e.clientX, y: e.clientY }; };
                window.addEventListener('mousemove', onMove);
                let raf;
                const tick = () => {
                    const dx = targetRef.current.x - posRef.current.x;
                    const dy = targetRef.current.y - posRef.current.y;
                    velRef.current.x = velRef.current.x * 0.8 + dx * 0.12;
                    velRef.current.y = velRef.current.y * 0.8 + dy * 0.12;
                    posRef.current.x += velRef.current.x;
                    posRef.current.y += velRef.current.y;
                    const skew = Math.max(-12, Math.min(12, velRef.current.x * 0.4));
                    if (elRef.current) {
                        elRef.current.style.transform = `translate3d(${posRef.current.x - 150}px, ${posRef.current.y - 200}px, 0) skewX(${skew}deg)`;
                    }
                    raf = requestAnimationFrame(tick);
                };
                tick();
                return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
            }, []);
            return elRef;
        };

        const PincodeChecker = () => {
            const [pin, setPin] = useState('');
            const [result, setResult] = useState(null);
            const [checking, setChecking] = useState(false);
            const check = () => {
                if (pin.length !== 6) { setResult({ ok: false, msg: 'Enter a valid 6-digit PIN code.' }); return; }
                setChecking(true); setResult(null);
                setTimeout(() => {
                    const deliveryDays = parseInt(pin[0]) < 5 ? 3 : 5;
                    const date = new Date(); date.setDate(date.getDate() + deliveryDays);
                    const label = date.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
                    setResult({ ok: true, msg: `FREE delivery by ${label}` });
                    setChecking(false);
                }, 900);
            };
            return (
                <div className="border-t border-black/8 pt-5 mb-5">
                    <p className="text-[10px] tracking-[0.3em] uppercase font-bold text-black/40 mb-3">Check Delivery</p>
                    <div className="flex gap-2">
                        <input type="text" maxLength={6} value={pin} onChange={e => { setPin(e.target.value.replace(/\D/g,'')); setResult(null); }}
                            placeholder="Enter PIN code" className="flex-1 border border-black/20 bg-white px-3 py-2.5 text-sm font-serif focus:outline-none focus:border-[#A6957A] transition-colors" />
                        <button onClick={check} disabled={checking}
                            className="px-5 bg-[#0D0D0D] text-white text-[9px] tracking-[0.2em] uppercase font-bold hover:bg-[#A6957A] transition-colors disabled:opacity-50">
                            {checking ? '...' : 'CHECK'}
                        </button>
                    </div>
                    {result && (
                        <p className={`text-[10px] mt-2 font-bold tracking-[0.1em] ${result.ok ? 'text-green-600' : 'text-red-500'}`}>
                            {result.ok ? '✓ ' : '✗ '}{result.msg}
                        </p>
                    )}
                </div>
            );
        };

                    <AnnouncementBanner onDismiss={() => setBannerShown(false)} />
                    <PageCurtain isActive={isCurtainActive} nextTitle={pendingPage === 'shop' ? 'Collections' : pendingPage === 'about' ? 'About Us' : pendingPage === 'contact' ? 'Contact Us' : 'Home'} />
                    <MobileNav currentPage={currentPage} handlePageChange={handlePageChange} cartLength={cart.length} isOpen={mobileNavOpen} onClose={() => setMobileNavOpen(false)} onCartOpen={() => setCartOpen(true)} />
                    <SizeGuideModal isOpen={sizeGuideOpen} onClose={() => setSizeGuideOpen(false)} />
                    <nav className={`fixed ${bannerShown ? 'top-10' : 'top-0'} w-full z-50 px-6 md:px-16 transition-all duration-1000 flex justify-between items-center ${navBgColor} ${navTextColor}`}>
                        <div className="flex gap-16 items-center text-[10px] tracking-[0.4em] uppercase font-bold w-1/3">
                            <button onClick={() => setMobileNavOpen(true)} className="md:hidden p-2 -ml-2"><Menu className="w-5 h-5" /></button>
                            <div className="hidden md:flex gap-16 items-center">{['shop', 'about'].map(page => (<MagneticButton key={page}><button onClick={() => handlePageChange(page)} className={`relative pb-1 hover:after:w-full after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-[1px] after:bg-current after:transition-all after:duration-500 ${currentPage === page ? 'after:w-full' : 'after:w-0'}`}>{page === 'shop' ? 'Collections' : 'About Us'}</button></MagneticButton>))}</div>
                        </div>
                        <div className="w-1/3 flex justify-center"><MagneticButton><button onClick={() => handlePageChange('home')} className="font-serif text-2xl md:text-3xl tracking-[0.3em] uppercase">TIIHA</button></MagneticButton></div>
                        <div className="flex gap-6 md:gap-16 items-center justify-end text-[10px] tracking-[0.4em] uppercase font-bold w-1/3"><MagneticButton><button onClick={() => handlePageChange('contact')} className={`hidden md:block relative pb-1 hover:after:w-full after:content-[''] after:absolute after:bottom-0 after:left-0 after:h-[1px] after:bg-current after:transition-all after:duration-500 ${currentPage === 'contact' ? 'after:w-full' : 'after:w-0'}`}>Contact Us</button></MagneticButton><MagneticButton><button onClick={() => setCartOpen(true)} className="flex items-center gap-3 group"><span>Bag</span><span className={`w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold transition-colors duration-700 ${isDarkHero ? 'bg-[#A6957A] text-[#0D0D0D]' : 'bg-[#0D0D0D] text-[#F0EBE1]'}`}>{cart.length}</span></button></MagneticButton></div>
                    </nav>
                    <main key={currentPage} className="animate-[pageFadeIn_1.5s_cubic-bezier(0.19,1,0.22,1)_forwards]">
                        {currentPage === 'home' && <HomePage products={liveProducts} setPage={handlePageChange} onSelect={setSelectedProduct} goToCollection={goToCollection} />}
                        {currentPage === 'shop' && <InteractiveArchive products={liveProducts} setProduct={setSelectedProduct} activeCollection={activeCollection} clearCollection={() => setActiveCollection(null)} />}
                        {currentPage === 'about' && <ManifestoPage />}
                        {currentPage === 'contact' && <InquiryPage />}
                        {currentPage === 'track' && <OrderTrackingPage setPage={handlePageChange} />}
                        {['privacy', 'terms', 'faqs', 'shipping', 'returns'].includes(currentPage) && <LegalPage contentKey={currentPage} />}
                    </main>
                    {selectedProduct && <ProductTakeover products={liveProducts} product={selectedProduct} onClose={() => setSelectedProduct(null)} onAdd={addToCart} onSelectRelated={setSelectedProduct} onSizeGuide={() => setSizeGuideOpen(true)} />}
                    <CartDrawer cart={cart} isOpen={cartOpen} onClose={() => setCartOpen(false)} onRemove={removeFromCart} />
                    <BackToTop hide={cartOpen} />
                    <WhatsAppButton hide={cartOpen} />
                    <footer className="bg-[#0D0D0D] text-[#F0EBE1] pt-40 pb-16 px-8 md:px-16 border-t border-white/5 relative z-10">
                        <div className="max-w-[1800px] mx-auto grid grid-cols-1 md:grid-cols-12 gap-24">
                            <div className="md:col-span-5"><h1 className="font-serif text-4xl tracking-[0.1em] mb-12 uppercase">TIIHA</h1><p className="text-[11px] tracking-[0.1em] text-white/50 leading-loose max-w-md font-light uppercase">Made with intent, for the woman who wears her confidence as naturally as she wears her clothes.</p></div>
                            <div className="md:col-span-7 grid grid-cols-2 md:grid-cols-3 gap-16 text-[9px] tracking-[0.3em] uppercase font-bold">
                                <div className="space-y-10"><span className="text-[#A6957A] mb-8 block font-serif text-lg normal-case tracking-normal italic">Maison</span><ul className="space-y-6 opacity-40 font-light"><li><button onClick={() => handlePageChange('about')}>About Us</button></li><li><button onClick={() => handlePageChange('contact')}>Contact Us</button></li></ul></div>
                                <div className="space-y-10"><span className="text-[#A6957A] mb-8 block font-serif text-lg normal-case tracking-normal italic">Client Services</span><ul className="space-y-6 opacity-40 font-light"><li><button onClick={() => handlePageChange('shipping')}>Shipping</button></li><li><button onClick={() => handlePageChange('returns')}>Returns</button></li><li><button onClick={() => handlePageChange('faqs')}>FAQs</button></li><li><button onClick={() => handlePageChange('track')}>Track Order</button></li></ul></div>
                                <div className="space-y-10 col-span-2 md:col-span-1"><span className="text-[#A6957A] mb-8 block font-serif text-lg normal-case tracking-normal italic">Network</span><ul className="space-y-6 opacity-40 font-light"><li><a href="https://www.instagram.com/tiiha.in?igsh=MW9ucmVuMjUxNWYyeQ==" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">Instagram</a></li><li><button>Newsletter</button></li><li className="pt-4 mt-4 border-t border-white/10">Vadodara, Gujarat</li></ul></div>
                            </div>
                        </div>
                        <div className="max-w-[1800px] mx-auto mt-40 pt-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center text-[9px] tracking-[0.3em] opacity-30 uppercase font-light gap-6"><span>© 2026 TIIHA. All Rights Reserved.</span><span className="flex gap-4"><button onClick={() => handlePageChange('terms')}>Terms</button> / <button onClick={() => handlePageChange('privacy')}>Privacy</button></span></div>
                    </footer>
                    <style>{`@keyframes pageFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }`}</style>
                </div>
            );
        }

        // Wrap App render with CursorContext + WishlistContext providers
        function AppWithContext() {
            const [cursorVariant, setCursorVariantState] = useState('default');
            const [cursorText, setCursorTextState] = useState('');
            const setCursor = (variant, text = '') => { setCursorVariantState(variant); setCursorTextState(text); };

            const [wishlist, setWishlist] = useState(() => {
                try { return JSON.parse(localStorage.getItem('tiiha_wishlist') || '[]'); } catch { return []; }
            });
            const toggleWishlist = (productId) => {
                setWishlist(prev => {
                    const next = prev.includes(productId) ? prev.filter(id => id !== productId) : [...prev, productId];
                    localStorage.setItem('tiiha_wishlist', JSON.stringify(next));
                    return next;
                });
            };
            const isWishlisted = (productId) => wishlist.includes(productId);

            return (
                <CursorContext.Provider value={{ cursorVariant, cursorText, setCursor }}>
                    <WishlistContext.Provider value={{ wishlist, toggleWishlist, isWishlisted }}>
                        <App />
                    </WishlistContext.Provider>
                </CursorContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWithContext />);
    </script>
</body>
</html>
